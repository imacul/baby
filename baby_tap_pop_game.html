<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap & Pop - Baby Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #fdfaf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  .wrap {
    text-align: center;
    padding: 1.5rem 1rem;
    box-sizing: border-box;
  }
  .subtitle {
    font-size: 16px;
    color: #888;
    margin-bottom: 1.2rem;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .tile {
    aspect-ratio: 1;
    border-radius: 24px;
    border: none;
    font-size: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s;
    user-select: none;
  }
  .particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    transition: transform 0.5s ease-out, opacity 0.5s ease-out;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="subtitle">Tap any shape!</div>
  <div id="grid"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<script>
  const items = [
    { emoji: '🐶', color: '#FAC775', note: 'C5' },
    { emoji: '🐱', color: '#F0997B', note: 'D5' },
    { emoji: '🐸', color: '#97C459', note: 'E5' },
    { emoji: '🐵', color: '#7F77DD', note: 'F5' },
    { emoji: '🐰', color: '#ED93B1', note: 'G5' },
    { emoji: '🦋', color: '#85B7EB', note: 'A5' },
    { emoji: '🐥', color: '#FAC775', note: 'B5' },
    { emoji: '🐢', color: '#5DCAA5', note: 'C6' },
    { emoji: '⭐', color: '#F0997B', note: 'D6' }
  ];

  const grid = document.getElementById('grid');
  let synth;

  items.forEach((it) => {
    const btn = document.createElement('button');
    btn.className = 'tile';
    btn.style.background = it.color;
    btn.textContent = it.emoji;
    btn.setAttribute('aria-label', 'tap to play sound');

    btn.addEventListener('click', async () => {
      if (!synth) {
        await Tone.start();
        synth = new Tone.Synth({
          oscillator: { type: 'sine' },
          envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.3 }
        }).toDestination();
      }
      synth.triggerAttackRelease(it.note, '8n');

      btn.style.transform = 'scale(1.3) rotate(8deg)';
      setTimeout(() => { btn.style.transform = 'scale(1)'; }, 200);

      for (let j = 0; j < 6; j++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = it.color;

        const rect = btn.getBoundingClientRect();
        const containerRect = grid.getBoundingClientRect();
        p.style.left = (rect.left - containerRect.left + rect.width / 2) + 'px';
        p.style.top = (rect.top - containerRect.top + rect.height / 2) + 'px';

        grid.appendChild(p);

        const angle = (Math.PI * 2 * j) / 6;
        const dist = 50 + Math.random() * 20;

        requestAnimationFrame(() => {
          p.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
          p.style.opacity = '0';
        });

        setTimeout(() => p.remove(), 550);
      }
    });

    grid.appendChild(btn);
  });
</script>

</body>
</html>
